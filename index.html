<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchDay — Revenue</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{
  --green:#1a7a4a;--green-light:#e8f5ee;--green-mid:#2ecc71;
  --text:#0f1f17;--text-s:#4a6358;--text-t:#8aa398;
  --bg:#f4f7f5;--card:#ffffff;
  --border:rgba(26,122,74,0.12);--border-s:rgba(26,122,74,0.25);
  --red:#c0392b;--amber:#d4830a;
  --ok-bg:#e8f5ee;--ok-txt:#1a5c35;
  --warn-bg:#fdf6e3;--warn-txt:#8a5500;
  --danger-bg:#fdf0ee;--danger-txt:#922b1e;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

.header{background:var(--text);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.logo{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--green-mid);letter-spacing:.15em;text-transform:uppercase;}
.header-right{display:flex;align-items:center;gap:1rem;}
.last-updated{font-size:11px;color:rgba(255,255,255,0.4);font-family:'DM Mono',monospace;}
.refresh-btn{font-size:11px;padding:4px 12px;border-radius:4px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);cursor:pointer;}

.status-bar{background:var(--green);padding:8px 2rem;font-size:11px;font-family:'DM Mono',monospace;color:rgba(255,255,255,0.7);display:flex;align-items:center;gap:8px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:#2ecc71;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

.nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;gap:0;}
.nav-tab{padding:.875rem 1.25rem;font-size:13px;font-weight:500;color:var(--text-t);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.nav-tab:hover{color:var(--text-s);}
.nav-tab.active{color:var(--green);border-bottom-color:var(--green);}

.main{padding:1.5rem 2rem 3rem;max-width:1400px;margin:0 auto;}
.section{display:none;}.section.active{display:block;}

.month-pills{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap;}
.month-pill{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border-s);background:transparent;color:var(--text-s);cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s;}
.month-pill:hover{background:var(--green-light);}
.month-pill.active{background:var(--green);color:white;border-color:var(--green);}
.month-pill.all{font-weight:600;}

.metrics{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:1.25rem;}
.metric{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.metric.accent{border-left:3px solid var(--green);}
.metric-label{font-size:10px;color:var(--text-t);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em;}
.metric-value{font-size:22px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace;}
.metric-sub{font-size:11px;color:var(--text-t);margin-top:3px;}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:.3rem;}
.card-sub{font-size:11px;color:var(--text-t);margin-bottom:1rem;}
.two-col{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(0,1fr);gap:1rem;margin-bottom:1rem;}
.three-col{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem;margin-bottom:1rem;}

.tbl{width:100%;font-size:12px;border-collapse:collapse;table-layout:fixed;}
.tbl th{font-size:10px;font-weight:600;color:var(--text-t);text-transform:uppercase;letter-spacing:.07em;padding:0 0 8px;text-align:left;border-bottom:1px solid var(--border);}
.tbl th:not(:first-child){text-align:right;}
.tbl td{padding:7px 0;border-bottom:1px solid var(--border);color:var(--text-s);}
.tbl td:first-child{color:var(--text);font-weight:500;}
.tbl td:not(:first-child){text-align:right;}
.tbl tr:last-child td{border-bottom:none;}

.bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px;}
.bar-fill{height:100%;border-radius:2px;background:var(--green);}

.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:11px;color:var(--text-s);}
.legend span{display:flex;align-items:center;gap:5px;}
.leg-sq{width:9px;height:9px;border-radius:2px;flex-shrink:0;}

.loading{text-align:center;padding:4rem;color:var(--text-t);}
.loading h3{font-size:16px;font-weight:500;margin-bottom:.5rem;color:var(--text-s);}

@media(max-width:900px){.metrics{grid-template-columns:repeat(2,1fr);}.two-col,.three-col{grid-template-columns:1fr;}.main{padding:1rem;}}
</style>
</head>
<body>

<div id="pwGate" style="position:fixed;inset:0;background:#0f1f17;display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="text-align:center;">
    <div style="font-family:'DM Mono',monospace;font-size:13px;color:#2ecc71;letter-spacing:.15em;text-transform:uppercase;margin-bottom:2rem;">⚽ MatchDay — Revenue</div>
    <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(26,122,74,0.3);border-radius:12px;padding:2rem 2.5rem;min-width:300px;">
      <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:1.25rem;">Enter password to continue</div>
      <input id="pwInput" type="password" placeholder="Password" autofocus
        style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid rgba(26,122,74,0.4);background:rgba(255,255,255,0.06);color:white;font-size:14px;outline:none;margin-bottom:.75rem;"
        onkeydown="if(event.key==='Enter')checkPw()">
      <div id="pwErr" style="font-size:11px;color:#c0392b;margin-bottom:.75rem;min-height:16px;"></div>
      <button onclick="checkPw()" style="width:100%;padding:10px;background:#1a7a4a;color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Unlock</button>
    </div>
  </div>
</div>
<script>
function checkPw(){
  if(document.getElementById('pwInput').value==='Matchday1!'){
    document.getElementById('pwGate').style.display='none';
    sessionStorage.setItem('md_auth','1');
    initDashboard();
  } else {
    document.getElementById('pwErr').textContent='Incorrect password.';
    document.getElementById('pwInput').value='';
  }
}
if(sessionStorage.getItem('md_auth')==='1'){
  document.addEventListener('DOMContentLoaded',()=>{
    document.getElementById('pwGate').style.display='none';
    initDashboard();
  });
}
</script>

<div class="header">
  <div class="logo">⚽ MatchDay — Revenue</div>
  <div class="header-right">
    <div class="last-updated" id="lastUpdated">Loading...</div>
    <button class="refresh-btn" onclick="loadStripeData()">↺ Refresh</button>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot" id="statusDot" style="background:#888;animation:none;"></div>
  <span id="statusText">Connecting to Stripe data...</span>
</div>

<div class="nav">
  <div class="nav-tab active" onclick="showTab('overview',event)">Overview</div>
  <div class="nav-tab" onclick="showTab('monthly',event)">Monthly</div>
  <div class="nav-tab" onclick="showTab('cities',event)">Cities</div>
  <div class="nav-tab" onclick="showTab('membership',event)">Membership</div>
</div>

<div class="main">
  <div class="section active" id="tab-overview"><div class="loading"><h3>Loading Stripe data...</h3><p>Fetching live data from Google Sheets</p></div></div>
  <div class="section" id="tab-monthly"><div class="loading"><h3>Loading...</h3></div></div>
  <div class="section" id="tab-cities"><div class="loading"><h3>Loading...</h3></div></div>
  <div class="section" id="tab-membership"><div class="loading"><h3>Loading...</h3></div></div>
</div>

<script>
const STRIPE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSoSwR1K04-_SV5cFXb9NNgCnOZ8MmZ2vAn0NlMRZNFe9VDMrLDrPnDtPDdd4uyPactBljHxTvJCYN_/pub?gid=406474328&single=true&output=csv';

const FIELD_CITY = {
  'San Juan Diego':'Austin','Premier match at SJD':'Austin','NEMP - Field 12':'Austin',
  'NEMP - Field 13':'Austin','NEMP - Field 14':'Austin','The Hattrick (Leander)':'Austin',
  '🎥The Hattrick (Leander)':'Austin','Round Rock - Field 1':'Austin','Stony Point High School':'Austin',
  'Onion Creek':'Austin',
  'ATH Pearland':'Houston','ATH Katy':'Houston','PAC GLOBAL':'Houston',
  'Katy International Sports Complex':'Houston','Katy International Sports Complex - Field 8':'Houston',
  'Soccer Central Field 4':'San Antonio','Soccer Central Field 4A':'San Antonio','Soccer Central Field 3':'San Antonio',
  'STAR Soccer Complex Field 11':'San Antonio',
  'Lou Fusz - Outdoor Field 10':'St. Louis','🎥 Lou Fusz - Outdoor Field 10':'St. Louis',
  'Lou Fusz - Indoor Field':'St. Louis','🎥 Lou Fusz - Indoor Field':'St. Louis',
  'Centennial Commons':'St. Louis','🎥 Centennial Commons':'St. Louis',
  'Bicentennial Park':'Dallas / Fort Worth','Carroll Senior High School':'Dallas / Fort Worth',
  'Hammond Park':'Atlanta','🎥 Hammond Park':'Atlanta','PRUMC':'Atlanta','🎥 PRUMC':'Atlanta',
  'Scissortail Park':'Oklahoma City',
};

const CODE_CITY = {ATX:'Austin',HOU:'Houston',SATX:'San Antonio',STL:'St. Louis',DFW:'Dallas / Fort Worth',ATL:'Atlanta',OKC:'Oklahoma City'};
const CITY_ORDER = ['Austin','Houston','San Antonio','St. Louis','Dallas / Fort Worth','Atlanta','Oklahoma City'];
const MONTHS = {'2026-01':'Jan','2026-02':'Feb','2026-03':'Mar','2026-04':'Apr','2026-05':'May','2026-06':'Jun','2026-07':'Jul','2026-08':'Aug','2026-09':'Sep','2026-10':'Oct','2026-11':'Nov','2026-12':'Dec'};

const charts = {};
let allCharges = [];
// Default to current month
const now = new Date();
const currentMonth = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
let selectedMonth = currentMonth;

function cityFromCharge(r) {
  const code = r['City Identifier']?.trim();
  if (code && CODE_CITY[code]) return CODE_CITY[code];
  const name = r['Match Name']?.trim() || '';
  for (const [field, city] of Object.entries(FIELD_CITY)) {
    if (name.includes(field) || field.includes(name)) return city;
  }
  return '';
}

function destroyChart(id){ if(charts[id]){charts[id].destroy();delete charts[id];} }
const gc = 'rgba(0,0,0,0.05)', tc = '#8aa398';

async function loadStripeData() {
  document.getElementById('statusDot').style.cssText='width:6px;height:6px;border-radius:50%;background:#888;animation:none;';
  document.getElementById('statusText').textContent = 'Fetching Stripe data...';
  try {
    const proxies = [
      'https://corsproxy.io/?' + STRIPE_URL,
      'https://api.allorigins.win/raw?url=' + encodeURIComponent(STRIPE_URL),
      'https://thingproxy.freeboard.io/fetch/' + STRIPE_URL,
    ];
    let text = null;
    for (const proxyUrl of proxies) {
      try {
        const r = await fetch(proxyUrl);
        if (r.ok) { const t = await r.text(); if (t && t.length > 200) { text = t; break; } }
      } catch(e) { console.warn('Proxy failed:', proxyUrl, e.message); }
    }
    if (!text) throw new Error('All proxies failed - check console');
    const lines = text.split('\n').filter(l=>l.trim());
    let start = 0;
    for(let i=0;i<Math.min(5,lines.length);i++){ if(lines[i].startsWith('Amount')){start=i;break;} }
    const csv = lines.slice(start).join('\n');
    allCharges = parseCSV(csv).filter(r=>r['Status']==='succeeded');
    document.getElementById('statusDot').style.cssText='width:6px;height:6px;border-radius:50%;background:#2ecc71;animation:pulse 2s infinite;';
    document.getElementById('statusText').textContent = `Live data · ${allCharges.length.toLocaleString()} charges loaded`;
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    renderAll();
  } catch(err) {
    document.getElementById('statusDot').style.cssText='width:6px;height:6px;border-radius:50%;background:#c0392b;animation:none;';
    document.getElementById('statusText').textContent = 'Failed to load — check connection';
    console.error(err);
  }
}

function parseCSV(text) {
  const lines = text.split('\n');
  const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for(const ch of line){
      if(ch==='"') inQ=!inQ;
      else if(ch===',' && !inQ){vals.push(cur.trim());cur='';}
      else cur+=ch;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h,i)=>obj[h]=vals[i]||'');
    return obj;
  });
}

function getCharges(month) {
  if(month==='all') return allCharges;
  return allCharges.filter(r=>r['Created']?.startsWith(month));
}

function getMonths() {
  const months = [...new Set(allCharges.map(r=>r['Created']?.slice(0,7)).filter(Boolean))].sort();
  return months;
}

function renderAll() {
  renderOverview();
  renderMonthly();
  renderCities();
  renderMembership();
}

function renderMonthPills(containerId, current, callback) {
  const months = getMonths();
  const el = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML = `<button class="month-pill all ${current==='all'?'active':''}" onclick="(${callback.toString()})('all')">YTD</button>` +
    months.map(m=>`<button class="month-pill ${current===m?'active':''}" onclick="(${callback.toString()})('${m}')">${MONTHS[m]||m}</button>`).join('');
}

// ── OVERVIEW ──
function renderOverview() {
  const charges = getCharges(selectedMonth);
  const matchRev = charges.filter(r=>r['Type']==='match').reduce((s,r)=>s+parseFloat(r['Amount']||0),0);
  const subRev = charges.filter(r=>r['Type']==='').reduce((s,r)=>s+parseFloat(r['Amount']||0),0);
  const otherRev = charges.filter(r=>r['Type']!=='match'&&r['Type']!=='').reduce((s,r)=>s+parseFloat(r['Amount']||0),0);
  const totalGMV = matchRev+subRev+otherRev;
  const matchCount = charges.filter(r=>r['Type']==='match').length;
  const subCount = charges.filter(r=>r['Type']==='').length;
  const months = getMonths();
  const label = selectedMonth==='all'?`YTD ${months[0]||''}–${months[months.length-1]||''}`:((MONTHS[selectedMonth]||selectedMonth)+' 2026');

  document.getElementById('tab-overview').innerHTML = `
    <div class="month-pills" id="overviewPills"></div>
    <div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text-t);margin-bottom:1rem;">${label}</div>
    <div class="metrics">
      <div class="metric accent"><div class="metric-label">Gross Revenue</div><div class="metric-value">$${Math.round(totalGMV).toLocaleString()}</div><div class="metric-sub">match + membership + other</div></div>
      <div class="metric"><div class="metric-label">Match revenue</div><div class="metric-value">$${Math.round(matchRev).toLocaleString()}</div><div class="metric-sub">${matchCount.toLocaleString()} charges</div></div>
      <div class="metric"><div class="metric-label">Membership MRR</div><div class="metric-value">$${Math.round(subRev).toLocaleString()}</div><div class="metric-sub">${subCount} charges</div></div>
      <div class="metric"><div class="metric-label">Other revenue</div><div class="metric-value">$${Math.round(otherRev).toLocaleString()}</div><div class="metric-sub">strikes, events, captain</div></div>
      <div class="metric"><div class="metric-label">Avg / match charge</div><div class="metric-value">$${matchCount?Math.round(matchRev/matchCount):0}</div><div class="metric-sub">per transaction</div></div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">Gross revenue by month</div>
        <div class="card-sub">Match revenue + membership MRR stacked</div>
        <div class="legend">
          <span><span class="leg-sq" style="background:#1a7a4a"></span>Match</span>
          <span><span class="leg-sq" style="background:#0e9e6e"></span>Membership</span>
          <span><span class="leg-sq" style="background:#d4830a"></span>Other</span>
        </div>
        <div style="position:relative;height:240px"><canvas id="ovMonthChart" role="img" aria-label="Monthly Gross revenue stacked bar chart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Revenue mix</div>
        <div class="card-sub">Match vs membership vs other</div>
        <div class="legend">
          <span><span class="leg-sq" style="background:#1a7a4a"></span>Match ${Math.round(matchRev/totalGMV*100)}%</span>
          <span><span class="leg-sq" style="background:#0e9e6e"></span>Membership ${Math.round(subRev/totalGMV*100)}%</span>
          <span><span class="leg-sq" style="background:#d4830a"></span>Other ${Math.round(otherRev/totalGMV*100)}%</span>
        </div>
        <div style="position:relative;height:200px"><canvas id="ovMixChart" role="img" aria-label="Revenue mix donut chart"></canvas></div>
      </div>
    </div>`;

  renderMonthPills('overviewPills', selectedMonth, (m)=>{ selectedMonth=m; renderAll(); });

  const months2 = getMonths();
  const byMonth = (type) => months2.map(m => {
    const c = allCharges.filter(r=>r['Created']?.startsWith(m)&&r['Status']==='succeeded');
    if(type==='match') return Math.round(c.filter(r=>r['Type']==='match').reduce((s,r)=>s+parseFloat(r['Amount']||0),0));
    if(type==='sub') return Math.round(c.filter(r=>r['Type']==='').reduce((s,r)=>s+parseFloat(r['Amount']||0),0));
    return Math.round(c.filter(r=>r['Type']!=='match'&&r['Type']!=='').reduce((s,r)=>s+parseFloat(r['Amount']||0),0));
  });

  destroyChart('ovMonthChart');
  charts['ovMonthChart'] = new Chart(document.getElementById('ovMonthChart'),{
    type:'bar',
    data:{labels:months2.map(m=>MONTHS[m]||m),datasets:[
      {label:'Match',data:byMonth('match'),backgroundColor:'#1a7a4a',borderRadius:0,borderSkipped:false},
      {label:'Membership',data:byMonth('sub'),backgroundColor:'#0e9e6e',borderRadius:0,borderSkipped:false},
      {label:'Other',data:byMonth('other'),backgroundColor:'#d4830a',borderRadius:4,borderSkipped:'bottom'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' $'+ctx.parsed.y.toLocaleString()}}},scales:{x:{stacked:true,grid:{display:false},ticks:{color:tc,font:{size:11}}},y:{stacked:true,grid:{color:gc},ticks:{color:tc,font:{size:11},callback:v=>'$'+Math.round(v/1000)+'k'}}}}
  });
  destroyChart('ovMixChart');
  charts['ovMixChart'] = new Chart(document.getElementById('ovMixChart'),{
    type:'doughnut',
    data:{labels:['Match','Membership','Other'],datasets:[{data:[Math.round(matchRev),Math.round(subRev),Math.round(otherRev)],backgroundColor:['#1a7a4a','#0e9e6e','#d4830a'],borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` $${ctx.parsed.toLocaleString()}`}}}}
  });
}

// ── MONTHLY ──
function renderMonthly() {
  const months = getMonths();
  const rows = months.map(m => {
    const c = allCharges.filter(r=>r['Created']?.startsWith(m));
    const match = c.filter(r=>r['Type']==='match').reduce((s,r)=>s+parseFloat(r['Amount']||0),0);
    const sub = c.filter(r=>r['Type']==='').reduce((s,r)=>s+parseFloat(r['Amount']||0),0);
    const other = c.filter(r=>r['Type']!=='match'&&r['Type']!=='').reduce((s,r)=>s+parseFloat(r['Amount']||0),0);
    const total = match+sub+other;
    const intros = c.filter(r=>r['Type']===''&&parseFloat(r['Amount']||0)<=1.5).length;
    return {m, match, sub, other, total, intros, count:c.length};
  });
  const maxTotal = Math.max(...rows.map(r=>r.total));
  const grandTotal = rows.reduce((s,r)=>s+r.total,0);

  document.getElementById('tab-monthly').innerHTML = `
    <div class="card">
      <div class="card-title">Month by month breakdown</div>
      <div class="card-sub">All revenue types · April is partial (month in progress)</div>
      <table class="tbl">
        <thead><tr>
          <th style="width:12%">Month</th>
          <th style="width:14%">Match rev</th>
          <th style="width:14%">Memb. MRR</th>
          <th style="width:10%">Other</th>
          <th style="width:12%">Gross Revenue</th>
          <th style="width:10%">Intros</th>
          <th style="width:28%">YTD share</th>
        </tr></thead>
        <tbody>${rows.map(r=>`<tr>
          <td style="font-family:'DM Mono',monospace">${MONTHS[r.m]||r.m} 2026</td>
          <td>$${Math.round(r.match).toLocaleString()}</td>
          <td>$${Math.round(r.sub).toLocaleString()}</td>
          <td>$${Math.round(r.other).toLocaleString()}</td>
          <td><strong>$${Math.round(r.total).toLocaleString()}</strong></td>
          <td>${r.intros}</td>
          <td><div style="font-size:10px;color:var(--text-t);margin-bottom:2px">${Math.round(r.total/grandTotal*100)}%</div><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(r.total/maxTotal*100)}%"></div></div></td>
        </tr>`).join('')}
        <tr style="font-weight:600;border-top:2px solid var(--border)">
          <td>YTD Total</td>
          <td>$${Math.round(rows.reduce((s,r)=>s+r.match,0)).toLocaleString()}</td>
          <td>$${Math.round(rows.reduce((s,r)=>s+r.sub,0)).toLocaleString()}</td>
          <td>$${Math.round(rows.reduce((s,r)=>s+r.other,0)).toLocaleString()}</td>
          <td><strong>$${Math.round(grandTotal).toLocaleString()}</strong></td>
          <td>${rows.reduce((s,r)=>s+r.intros,0)}</td>
          <td></td>
        </tr></tbody>
      </table>
    </div>
    <div class="card">
      <div class="card-title">Match vs membership trend</div>
      <div class="legend">
        <span><span class="leg-sq" style="background:#1a7a4a"></span>Match revenue</span>
        <span><span class="leg-sq" style="background:#0e9e6e;border:1px dashed #0e9e6e"></span>Membership MRR</span>
      </div>
      <div style="position:relative;height:260px"><canvas id="monthTrendChart" role="img" aria-label="Line chart of match revenue and membership MRR by month"></canvas></div>
    </div>`;

  destroyChart('monthTrendChart');
  charts['monthTrendChart'] = new Chart(document.getElementById('monthTrendChart'),{
    type:'line',
    data:{labels:rows.map(r=>MONTHS[r.m]||r.m),datasets:[
      {label:'Match',data:rows.map(r=>Math.round(r.match)),borderColor:'#1a7a4a',backgroundColor:'rgba(26,122,74,0.08)',tension:.35,pointRadius:4,pointBackgroundColor:'#1a7a4a',fill:true,borderWidth:2},
      {label:'Membership',data:rows.map(r=>Math.round(r.sub)),borderColor:'#0e9e6e',backgroundColor:'rgba(14,158,110,0.06)',tension:.35,pointRadius:4,pointBackgroundColor:'#0e9e6e',fill:true,borderWidth:2,borderDash:[5,3]},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' $'+ctx.parsed.y.toLocaleString()}}},scales:{x:{grid:{display:false},ticks:{color:tc,font:{size:11}}},y:{grid:{color:gc},ticks:{color:tc,font:{size:11},callback:v=>'$'+Math.round(v/1000)+'k'},beginAtZero:true}}}
  });
}

// ── CITIES ──
function renderCities() {
  const charges = getCharges(selectedMonth);
  const matchCharges = charges.filter(r=>r['Type']==='match');
  const cityRev = {};
  const cityCount = {};
  CITY_ORDER.forEach(c=>{cityRev[c]=0;cityCount[c]=0;});
  let untagged = 0;
  matchCharges.forEach(r=>{
    const city = cityFromCharge(r);
    const amt = parseFloat(r['Amount']||0);
    if(city && cityRev[city]!==undefined){cityRev[city]+=amt;cityCount[city]++;}
    else untagged+=amt;
  });
  const totalMatch = Object.values(cityRev).reduce((s,v)=>s+v,0);
  const maxRev = Math.max(...Object.values(cityRev));
  const months = getMonths();
  const label = selectedMonth==='all'?`YTD (${months[0]}–${months[months.length-1]})`:((MONTHS[selectedMonth]||selectedMonth)+' 2026');

  document.getElementById('tab-cities').innerHTML = `
    <div class="month-pills" id="citiesPills"></div>
    <div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text-t);margin-bottom:1rem;">${label} · match revenue only</div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">Match revenue by city</div>
        <div style="position:relative;height:280px"><canvas id="cityRevChart" role="img" aria-label="Horizontal bar chart of match revenue by city"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">City breakdown</div>
        <div class="card-sub">Match revenue · charges · share of total</div>
        <table class="tbl">
          <thead><tr><th style="width:35%">City</th><th style="width:20%">Revenue</th><th style="width:15%">Charges</th><th style="width:30%">Share</th></tr></thead>
          <tbody>${CITY_ORDER.map(c=>{
            const pct = Math.round(cityRev[c]/maxRev*100);
            const share = Math.round(cityRev[c]/totalMatch*100);
            return `<tr><td>${c}</td><td>$${Math.round(cityRev[c]).toLocaleString()}</td><td>${cityCount[c]}</td><td><div style="font-size:10px;color:var(--text-t);margin-bottom:2px">${share}%</div><div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div></td></tr>`;
          }).join('')}
          ${untagged>0?`<tr><td style="color:var(--text-t)">Untagged</td><td style="color:var(--text-t)">$${Math.round(untagged).toLocaleString()}</td><td style="color:var(--text-t)">—</td><td></td></tr>`:''}
          </tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-title">City revenue by month</div>
      <div style="position:relative;height:280px"><canvas id="citiesMonthChart" role="img" aria-label="Line chart of match revenue by city over months"></canvas></div>
    </div>`;

  renderMonthPills('citiesPills', selectedMonth, (m)=>{ selectedMonth=m; renderAll(); });

  destroyChart('cityRevChart');
  charts['cityRevChart'] = new Chart(document.getElementById('cityRevChart'),{
    type:'bar',
    data:{labels:CITY_ORDER,datasets:[{data:CITY_ORDER.map(c=>Math.round(cityRev[c])),backgroundColor:'#1a7a4a',borderRadius:4,borderSkipped:false}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' $'+ctx.parsed.x.toLocaleString()}}},scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:11},callback:v=>'$'+Math.round(v/1000)+'k'}},y:{grid:{display:false},ticks:{color:tc,font:{size:10}}}}}
  });

  const cityColors = ['#1a7a4a','#0e9e6e','#2980b9','#d4830a','#8e44ad','#c0392b','#16a085'];
  const months2 = getMonths();
  destroyChart('citiesMonthChart');
  charts['citiesMonthChart'] = new Chart(document.getElementById('citiesMonthChart'),{
    type:'line',
    data:{labels:months2.map(m=>MONTHS[m]||m),datasets:CITY_ORDER.map((city,i)=>({
      label:city,
      data:months2.map(m=>{
        const c=allCharges.filter(r=>r['Created']?.startsWith(m)&&r['Type']==='match'&&r['Status']==='succeeded');
        return Math.round(c.filter(r=>cityFromCharge(r)===city).reduce((s,r)=>s+parseFloat(r['Amount']||0),0));
      }),
      borderColor:cityColors[i],tension:.35,pointRadius:3,borderWidth:2,fill:false
    }))},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: $${ctx.parsed.y.toLocaleString()}`}}},scales:{x:{grid:{display:false},ticks:{color:tc,font:{size:11}}},y:{grid:{color:gc},ticks:{color:tc,font:{size:11},callback:v=>'$'+Math.round(v/1000)+'k'},beginAtZero:true}}}
  });
}

// ── MEMBERSHIP ──
function renderMembership() {
  const charges = getCharges(selectedMonth);
  const subs = charges.filter(r=>r['Type']==='');
  const totalMRR = subs.reduce((s,r)=>s+parseFloat(r['Amount']||0),0);
  const intros = subs.filter(r=>parseFloat(r['Amount']||0)<=1.5);
  const full = subs.filter(r=>parseFloat(r['Amount']||0)>1.5);
  const introRev = intros.reduce((s,r)=>s+parseFloat(r['Amount']||0),0);
  const fullRev = full.reduce((s,r)=>s+parseFloat(r['Amount']||0),0);
  const months = getMonths();
  const label = selectedMonth==='all'?`YTD`:((MONTHS[selectedMonth]||selectedMonth)+' 2026');

  const mrrByMonth = months.map(m=>{
    const c = allCharges.filter(r=>r['Created']?.startsWith(m)&&r['Type']===''&&r['Status']==='succeeded');
    const total = c.reduce((s,r)=>s+parseFloat(r['Amount']||0),0);
    const i = c.filter(r=>parseFloat(r['Amount']||0)<=1.5).length;
    const f = c.filter(r=>parseFloat(r['Amount']||0)>1.5).length;
    return {m, total, intros:i, full:f};
  });

  document.getElementById('tab-membership').innerHTML = `
    <div class="month-pills" id="memberPills"></div>
    <div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text-t);margin-bottom:1rem;">${label}</div>
    <div class="metrics">
      <div class="metric accent"><div class="metric-label">Total MRR</div><div class="metric-value">$${Math.round(totalMRR).toLocaleString()}</div><div class="metric-sub">${subs.length} charges</div></div>
      <div class="metric"><div class="metric-label">Full / prorated</div><div class="metric-value">${full.length}</div><div class="metric-sub">$${Math.round(fullRev).toLocaleString()} revenue</div></div>
      <div class="metric"><div class="metric-label">$1 intros</div><div class="metric-value">${intros.length}</div><div class="metric-sub">$${Math.round(introRev).toLocaleString()} revenue</div></div>
      <div class="metric"><div class="metric-label">Avg charge</div><div class="metric-value">$${subs.length?Math.round(totalMRR/subs.length):0}</div><div class="metric-sub">per membership charge</div></div>
      <div class="metric"><div class="metric-label">Intro rate</div><div class="metric-value">${subs.length?Math.round(intros.length/subs.length*100):0}%</div><div class="metric-sub">of all membership charges</div></div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">Membership MRR by month</div>
        <div class="legend">
          <span><span class="leg-sq" style="background:#1a7a4a"></span>Full / prorated</span>
          <span><span class="leg-sq" style="background:#d4830a"></span>$1 intros</span>
        </div>
        <div style="position:relative;height:220px"><canvas id="mrrMonthChart" role="img" aria-label="Stacked bar chart of MRR by month"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Monthly membership summary</div>
        <table class="tbl">
          <thead><tr><th style="width:20%">Month</th><th style="width:20%">MRR</th><th style="width:20%">Full</th><th style="width:20%">Intros</th><th style="width:20%">Intro %</th></tr></thead>
          <tbody>${mrrByMonth.map(r=>`<tr>
            <td style="font-family:'DM Mono',monospace">${MONTHS[r.m]||r.m}</td>
            <td>$${Math.round(r.total).toLocaleString()}</td>
            <td>${r.full}</td>
            <td>${r.intros}</td>
            <td>${r.full+r.intros?Math.round(r.intros/(r.full+r.intros)*100):0}%</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;

  renderMonthPills('memberPills', selectedMonth, (m)=>{ selectedMonth=m; renderAll(); });

  destroyChart('mrrMonthChart');
  charts['mrrMonthChart'] = new Chart(document.getElementById('mrrMonthChart'),{
    type:'bar',
    data:{labels:mrrByMonth.map(r=>MONTHS[r.m]||r.m),datasets:[
      {label:'Full/prorated',data:mrrByMonth.map(r=>{
        const c=allCharges.filter(x=>x['Created']?.startsWith(r.m)&&x['Type']===''&&x['Status']==='succeeded'&&parseFloat(x['Amount']||0)>1.5);
        return Math.round(c.reduce((s,x)=>s+parseFloat(x['Amount']||0),0));
      }),backgroundColor:'#1a7a4a',borderRadius:0,borderSkipped:false},
      {label:'Intros',data:mrrByMonth.map(r=>Math.round(r.intros*1.08)),backgroundColor:'#d4830a',borderRadius:4,borderSkipped:'bottom'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' $'+ctx.parsed.y.toLocaleString()}}},scales:{x:{stacked:true,grid:{display:false},ticks:{color:tc,font:{size:11}}},y:{stacked:true,grid:{color:gc},ticks:{color:tc,font:{size:11},callback:v=>'$'+Math.round(v/1000)+'k'}}}}
  });
}

function showTab(name, e) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(e) e.target.classList.add('active');
}

function initDashboard() { loadStripeData(); }
</script>
</body>
</html>
