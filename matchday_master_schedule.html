<!DOCTYPE html>
<html>
<head>
<link rel="icon" href="/matchday-data/Matchday-RGB_Badge_LightGreen%20(2).png">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MatchDay — Master Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#F4EEE1;--card:#ffffff;--text:#003326;--muted:#5a6e68;--border:#d4cfc4;
--accent:#2CDB87;--accent-light:#e0faf0;--accent-dark:#003326;
--green-deep:#003326;--green-bright:#2CDB87;--cream:#F4EEE1;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding:0;min-height:100vh}
.header{background:var(--green-deep);color:white;padding:1.5rem 2.5rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:16px}
.header-logo{height:28px;width:auto;flex-shrink:0}
.header-text p{font-size:.75rem;color:rgba(255,255,255,.5);font-family:'Space Mono',monospace}
.controls{display:flex;gap:10px;flex-wrap:wrap;padding:1rem 2.5rem;background:white;border-bottom:1px solid var(--border);position:sticky;top:70px;z-index:99}
.controls select,.controls input{font-family:'DM Sans',sans-serif;font-size:.85rem;padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:white;color:var(--text);outline:none;min-width:130px}
.controls select:focus,.controls input:focus{border-color:var(--green-bright)}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-left:auto}
.view-toggle button{font-family:'DM Sans',sans-serif;font-size:.8rem;padding:8px 14px;border:none;background:white;cursor:pointer;color:var(--muted);font-weight:500;white-space:nowrap}
.view-toggle button.active{background:var(--green-deep);color:white}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;padding:1.5rem 2.5rem}
.stat{background:white;border-radius:12px;padding:1rem 1.25rem;border:1px solid var(--border)}
.stat .label{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:4px}
.stat .value{font-size:1.5rem;font-weight:700;letter-spacing:-1px;color:var(--green-deep)}
.stat .sub{font-size:.72rem;color:var(--muted);margin-top:2px}
.content{padding:1rem 2.5rem 3rem}
.week-nav{display:flex;align-items:center;gap:12px;padding:1rem 2.5rem;background:white;border-bottom:1px solid var(--border)}
.week-nav button{font-family:'DM Sans',sans-serif;font-size:.85rem;padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:white;cursor:pointer;font-weight:500;color:var(--text)}
.week-nav button:hover{background:var(--accent-light)}
.week-nav .current{font-family:'Space Mono',monospace;font-size:.85rem;font-weight:700;color:var(--green-deep)}
.this-week{background:var(--green-bright);color:var(--green-deep);font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:700;font-family:'Space Mono',monospace}
.city-section{margin-bottom:2rem}
.city-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--green-deep)}
.city-header h2{font-size:1.1rem;font-weight:700;letter-spacing:-0.3px;color:var(--green-deep)}
.city-header .badge{font-family:'Space Mono',monospace;font-size:.7rem;background:var(--accent-light);color:var(--green-deep);padding:3px 10px;border-radius:20px;font-weight:700}
.venue-group{margin-bottom:14px}
.venue-name{font-size:.85rem;font-weight:700;color:var(--green-deep);margin-bottom:6px}
.schedule-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day-header{font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-family:'Space Mono',monospace;text-align:center;padding:4px}
.day-cell{min-height:24px;text-align:center}
.mp{font-size:.68rem;padding:2px 5px;border-radius:5px;background:var(--accent-light);color:var(--green-deep);font-family:'Space Mono',monospace;margin:1px 0;display:block;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp.past{background:#ebe8e0;color:#aaa}
.compact-day{display:flex;flex-direction:column;gap:1px;align-items:center}
.cm-row{background:var(--accent-light);border-radius:4px;padding:1px 5px;display:flex;gap:3px;align-items:center}
.cm-row .t{color:var(--green-deep);font-weight:700;font-size:.65rem;font-family:'Space Mono',monospace}
.cm-row .v{color:var(--muted);font-weight:400;font-size:.65rem;font-family:'Space Mono',monospace;margin-left:2px}
.cm-row.past{background:#ebe8e0}
.cm-row.past .t{color:#aaa}.cm-row.past .v{color:#ccc}
.changes-summary{display:flex;align-items:center;gap:10px;padding:12px 16px;margin-bottom:16px;background:white;border:1px solid var(--border);border-radius:10px;flex-wrap:wrap}
.changes-summary-header{font-size:.8rem;font-weight:700;font-family:'Space Mono',monospace;color:var(--green-deep);margin-right:4px}
.cs-badge{font-size:.7rem;font-family:'Space Mono',monospace;padding:3px 10px;border-radius:20px;font-weight:700}
.cs-badge.added{background:#d5f5e3;color:#1a7a42}
.cs-badge.dropped{background:#fadbd8;color:#a93226}
.cs-badge.changed{background:#fef3dc;color:#9a6d1f}
.changes-banner{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.change-item{font-size:.72rem;font-family:'Space Mono',monospace;padding:3px 10px;border-radius:6px;font-weight:500}
.change-item.added{background:#d5f5e3;color:#1a7a42}
.change-item.dropped{background:#fadbd8;color:#a93226;text-decoration:line-through}
.change-item.changed{background:#fef3dc;color:#9a6d1f}
.cm-row.new{background:#d5f5e3;border:1px solid #82d9a5}
.cm-row.new .t{color:#1a7a42}.cm-row.new .v{color:#2d9a55}
.new-dot{width:5px;height:5px;border-radius:50%;background:#1a7a42;display:inline-block;margin-left:2px}
.cm-row.dropped-match{background:#fadbd8;border:1px dashed #e8a09a;opacity:.7}
.cm-row.dropped-match .t{color:#a93226;text-decoration:line-through}.cm-row.dropped-match .v{color:#c0706a;text-decoration:line-through}
.drop-x{color:#a93226;font-size:.6rem;margin-left:2px;font-weight:700}
.no-matches{font-size:.85rem;color:var(--muted);font-style:italic;padding:12px}
.list-row{display:grid;grid-template-columns:90px 180px 1fr 70px;gap:12px;padding:8px 12px;border-bottom:1px solid #ebe8e0;align-items:center;font-size:.85rem}
.list-row:hover{background:var(--accent-light)}
.list-row .date{font-family:'Space Mono',monospace;color:var(--muted);font-size:.78rem}
.list-row .venue{font-weight:500}
.list-row .time{color:var(--muted)}
.list-row .spots-badge{font-family:'Space Mono',monospace;font-size:.7rem;background:#ebe8e0;padding:3px 8px;border-radius:12px;text-align:center}
.today-btn{margin-left:auto;background:var(--green-bright);color:var(--green-deep);border-color:var(--green-bright);font-weight:700}
.today-btn:hover{background:#24c278}
@media(max-width:768px){
.controls,.stats,.content,.week-nav{padding-left:1rem;padding-right:1rem}
.header{padding:1.5rem 1rem}
.list-row{grid-template-columns:70px 130px 1fr 50px;font-size:.75rem}
}
</style>
</head>

}

function addDays(d,n){const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10)}
function fmtDate(d){const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function fmtDateFull(d){const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function fmtWeekRange(mon){return fmtDate(mon)+' \u2013 '+fmtDate(addDays(mon,6))}
function isThisWeek(mon){return mon===getMonday(TODAY)}
function fmtShortTime(t){return t.split(' - ')[0].replace(':00','').replace(' ','')}

function getFiltered(){
let d=ALL;
if(filters.city)d=d.filter(s=>s.city===filters.city);
if(filters.venue)d=d.filter(s=>s.venue===filters.venue);
if(filters.dateFrom)d=d.filter(s=>s.date>=filters.dateFrom);
if(filters.dateTo)d=d.filter(s=>s.date<=filters.dateTo);
return d;
}
function getWeekData(mon){const sun=addDays(mon,6);return getFiltered().filter(s=>s.date>=mon&&s.date<=sun)}

function initFilters(){
const cities=[...new Set(ALL.map(s=>s.city))].sort();
const cf=document.getElementById('cityFilter');
cities.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cf.appendChild(o)});
cf.onchange=e=>{filters.city=e.target.value;updateVenueFilter();render()};
document.getElementById('venueFilter').onchange=e=>{filters.venue=e.target.value;render()};
document.getElementById('dateFrom').onchange=e=>{filters.dateFrom=e.target.value;render()};
document.getElementById('dateTo').onchange=e=>{filters.dateTo=e.target.value;render()};
updateVenueFilter();
}
function updateVenueFilter(){
const vf=document.getElementById('venueFilter');
const venues=[...new Set(ALL.filter(s=>!filters.city||s.city===filters.city).map(s=>s.venue))].sort();
vf.innerHTML='<option value="">All field partners</option>';
venues.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;vf.appendChild(o)});
}

function renderStats(){
const vw=getWeekData(currentWeekStart);
const vwCities=new Set(vw.map(s=>s.city));
const vwVenues=new Set(vw.map(s=>s.venue));
const weekLabel=isThisWeek(currentWeekStart)?'This week':'Selected week';
document.getElementById('stats').innerHTML=`
<div class="stat"><div class="label">${weekLabel}</div><div class="value">${vw.length}</div><div class="sub">${fmtWeekRange(currentWeekStart)}</div></div>
<div class="stat"><div class="label">Cities</div><div class="value">${vwCities.size}</div></div>
<div class="stat"><div class="label">Field partners</div><div class="value">${vwVenues.size}</div></div>`;
}

const CITY_ORDER=['Austin','Houston','San Antonio','Dallas','Atlanta','St. Louis','OKC','El Paso'];
function citySort(a,b){const ai=CITY_ORDER.indexOf(a)===-1?99:CITY_ORDER.indexOf(a);const bi=CITY_ORDER.indexOf(b)===-1?99:CITY_ORDER.indexOf(b);return ai-bi}

function getWeekFingerprints(mon){
const sun=addDays(mon,6);
const week=ALL.filter(s=>s.date>=mon&&s.date<=sun);
const fps={};
week.forEach(s=>{
const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(s.date+'T00:00:00').getDay()];
const key=s.city+'|'+dow+'|'+fmtShortTime(s.time)+'|'+getAbbr(s.detail);
fps[key]={city:s.city,day:dow,time:fmtShortTime(s.time),abbr:getAbbr(s.detail),detail:s.detail,fullTime:s.time};
});
return fps;
}

function prevWeekHasData(mon){
const prevMon=addDays(mon,-7);
const prevSun=addDays(prevMon,6);
return ALL.some(s=>s.date>=prevMon&&s.date<=prevSun);
}

function getWeekChanges(currentMon){
if(!prevWeekHasData(currentMon))return{added:[],dropped:[],timeChanged:[]};
const prevMon=addDays(currentMon,-7);
const curr=getWeekFingerprints(currentMon);
const prev=getWeekFingerprints(prevMon);
const added=[];const dropped=[];const timeChanged=[];
for(const k in curr){if(!prev[k]){
const c=curr[k];
const prevSameSlot=Object.values(prev).find(p=>p.city===c.city&&p.day===c.day&&p.abbr===c.abbr);
if(prevSameSlot){timeChanged.push({...c,oldTime:prevSameSlot.time})}
else{added.push(c)}
}}
for(const k in prev){if(!curr[k]){
const p=prev[k];
const currSameSlot=Object.values(curr).find(c=>c.city===p.city&&c.day===p.day&&c.abbr===p.abbr);
if(!currSameSlot){dropped.push(p)}
}}
return{added,dropped,timeChanged};
}

function renderChangeBanner(city,changes){
const cityAdded=changes.added.filter(c=>c.city===city);
const cityDropped=changes.dropped.filter(c=>c.city===city);
const cityChanged=changes.timeChanged.filter(c=>c.city===city);
if(cityAdded.length===0&&cityDropped.length===0&&cityChanged.length===0)return'';
let html='<div class="changes-banner">';
cityAdded.forEach(c=>{html+=`<div class="change-item added">+ ${c.day} ${c.time} ${c.abbr}</div>`});
cityDropped.forEach(c=>{html+=`<div class="change-item dropped">- ${c.day} ${c.time} ${c.abbr}</div>`});
cityChanged.forEach(c=>{html+=`<div class="change-item changed">${c.day} ${c.abbr}: ${c.oldTime} \u2192 ${c.time}</div>`});
html+='</div>';
return html;
}

function renderCompactView(){
const weekData=getWeekData(currentWeekStart);
document.getElementById('weekNav').style.display='flex';
document.getElementById('weekLabel').innerHTML=fmtWeekRange(currentWeekStart)+(isThisWeek(currentWeekStart)?' <span class="this-week">current</span>':'');
const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const dayDates=days.map((_,i)=>addDays(currentWeekStart,i));
const changes=getWeekChanges(currentWeekStart);
const hasAnyChanges=changes.added.length+changes.dropped.length+changes.timeChanged.length>0;
const byCity={};
weekData.forEach(s=>{if(!byCity[s.city])byCity[s.city]=[];byCity[s.city].push(s)});
const allCitiesWithDrops=[...new Set([...Object.keys(byCity),...changes.dropped.map(c=>c.city)])];
const sortedCities=allCitiesWithDrops.sort(citySort);
let html='';
if(hasAnyChanges){
html+=`<div class="changes-summary"><div class="changes-summary-header">Changes vs last week</div>`;
if(changes.added.length)html+=`<span class="cs-badge added">${changes.added.length} added</span>`;
if(changes.dropped.length)html+=`<span class="cs-badge dropped">${changes.dropped.length} dropped</span>`;
if(changes.timeChanged.length)html+=`<span class="cs-badge changed">${changes.timeChanged.length} time changed</span>`;
html+=`</div>`;
}
if(sortedCities.length===0)html+='<div class="no-matches">No matches this week.</div>';
sortedCities.forEach(city=>{
const cityData=byCity[city]||[];
const count=cityData.length;
html+=`<div class="city-section"><div class="city-header"><h2>${city}</h2><span class="badge">${count}</span></div>`;
html+=renderChangeBanner(city,changes);
html+=`<div class="schedule-grid">`;
days.forEach((d,i)=>{html+=`<div class="day-header">${d}<br><span style="font-size:.55rem;opacity:.6">${fmtDate(dayDates[i])}</span></div>`});
dayDates.forEach(dd=>{
const dayMatches=cityData.filter(s=>s.date===dd).sort((a,b)=>parseTime(a.time)-parseTime(b.time));
const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(dd+'T00:00:00').getDay()];
const dayAdded=changes.added.filter(c=>c.city===city&&c.day===dow);
const dayDropped=changes.dropped.filter(c=>c.city===city&&c.day===dow);
html+=`<div class="day-cell"><div class="compact-day">`;
if(dayMatches.length===0&&dayDropped.length===0){html+='';}
else{
dayMatches.forEach(m=>{
const past=m.date<TODAY?'past':'';
const t=fmtShortTime(m.time);
const abbr=getAbbr(m.detail);
const isNew=dayAdded.some(a=>a.time===t&&a.abbr===abbr);
html+=`<div class="cm-row ${past} ${isNew?'new':''}" title="${m.detail} | ${m.time} | ${m.spots} spots"><span class="t">${t}</span><span class="v">${abbr}</span>${isNew?'<span class="new-dot"></span>':''}</div>`;
});
dayDropped.forEach(d=>{
html+=`<div class="cm-row dropped-match" title="Dropped from last week"><span class="t">${d.time}</span><span class="v">${d.abbr}</span><span class="drop-x">\u2715</span></div>`;
});
}
html+=`</div></div>`;
});
html+=`</div></div>`;
});
document.getElementById('content').innerHTML=html;
}

function renderWeekView(){
const weekData=getWeekData(currentWeekStart);
document.getElementById('weekNav').style.display='flex';
document.getElementById('weekLabel').innerHTML=fmtWeekRange(currentWeekStart)+(isThisWeek(currentWeekStart)?' <span class="this-week">current</span>':'');
const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const dayDates=days.map((_,i)=>addDays(currentWeekStart,i));
const byCityVenue={};
weekData.forEach(s=>{
const key=s.city+'|||'+s.venue;
if(!byCityVenue[key])byCityVenue[key]={city:s.city,venue:s.venue,matches:{}};
dayDates.forEach(dd=>{if(!byCityVenue[key].matches[dd])byCityVenue[key].matches[dd]=[]});
byCityVenue[key].matches[s.date].push(s);
});
const byCity={};
Object.values(byCityVenue).forEach(v=>{if(!byCity[v.city])byCity[v.city]=[];byCity[v.city].push(v)});
const sortedCities=Object.keys(byCity).sort(citySort);
let html='';
if(sortedCities.length===0)html='<div class="no-matches">No matches this week.</div>';
sortedCities.forEach(city=>{
const venues=byCity[city].sort((a,b)=>a.venue.localeCompare(b.venue));
const cityCount=venues.reduce((sum,v)=>sum+Object.values(v.matches).flat().length,0);
html+=`<div class="city-section"><div class="city-header"><h2>${city}</h2><span class="badge">${cityCount}</span></div>`;
venues.forEach(v=>{
html+=`<div class="venue-group"><div class="venue-name">${v.venue}</div><div class="schedule-grid">`;
days.forEach((d,i)=>{html+=`<div class="day-header">${d}<br><span style="font-size:.55rem;opacity:.6">${fmtDate(dayDates[i])}</span></div>`});
dayDates.forEach(dd=>{
const matches=(v.matches[dd]||[]).sort((a,b)=>parseTime(a.time)-parseTime(b.time));
html+=`<div class="day-cell">`;
matches.forEach(m=>{
const past=m.date<TODAY?'past':'';
html+=`<div class="mp ${past}" title="${m.time} | ${m.spots} spots">${fmtShortTime(m.time)}</div>`;
});
html+=`</div>`;
});
html+=`</div></div>`;
});
html+=`</div>`;
});
document.getElementById('content').innerHTML=html;
}

function renderListView(){
document.getElementById('weekNav').style.display='none';
const d=getFiltered().filter(s=>s.date>=TODAY).sort((a,b)=>a.date.localeCompare(b.date)||parseTime(a.time)-parseTime(b.time));
let html='<div class="list-row" style="font-weight:700;border-bottom:2px solid var(--green-deep);font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-family:Space Mono,monospace"><div>Date</div><div>Venue</div><div>Time</div><div>Spots</div></div>';
d.slice(0,300).forEach(s=>{
html+=`<div class="list-row"><div class="date">${s.day} ${fmtDate(s.date)}</div><div class="venue">${s.venue}<br><span style="font-size:.7rem;color:var(--muted)">${s.city}</span></div><div class="time">${s.time}</div><div class="spots-badge">${s.spots}</div></div>`;
});
if(d.length>300)html+=`<div class="no-matches">Showing first 300 of ${d.length}. Use filters.</div>`;
document.getElementById('content').innerHTML=html;
}

function setView(v){
currentView=v;
document.querySelectorAll('.view-toggle button').forEach(b=>{b.classList.toggle('active',b.dataset.view===v)});
render();
}
function prevWeek(){currentWeekStart=addDays(currentWeekStart,-7);render()}
function nextWeek(){currentWeekStart=addDays(currentWeekStart,7);render()}
function goToday(){currentWeekStart=getMonday(TODAY);render()}

function render(){
renderStats();
if(currentView==='compact')renderCompactView();
else if(currentView==='week')renderWeekView();
else renderListView();
}

function init(){
const dates=ALL.map(s=>s.date).sort();
document.getElementById('headerSub').textContent=`${new Set(ALL.map(s=>s.venue)).size} field partners \u00B7 ${new Set(ALL.map(s=>s.city)).size} cities \u00B7 ${fmtDateFull(dates[0])} \u2013 ${fmtDateFull(dates[dates.length-1])}`;
initFilters();render();
}
init();
</script>
</body>
</html>
